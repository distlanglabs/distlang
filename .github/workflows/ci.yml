name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.21.x", "stable"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: fmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needed on these files:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build CLI
        run: |
          mkdir -p bin
          go build -o bin/distlang ./cmd/distlang

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v6
        with:
          name: distlang-${{ matrix.go-version }}-linux-amd64
          path: bin/distlang
          retention-days: 14
